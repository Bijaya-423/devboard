# Goal: To deploy the built images from CI Steps once the CI Worklow is Succeeded

# Runner

# Github runner- ubuntu-latest- ephermal runner

# self-hosted runner - long living

# Today deploy built image from CI steps once the ci workflow is successded

name: CD

on:
    workflow_run:
      workflows: ['CI']
      types: [completed]
      branches:
        - advanced

jobs:
    deploy:
      if: github.event.workflow_run.conclusion == 'success'
      runs-on: self-hosted
      steps:
        - name: Code Checkout
          uses: actions/checkout@v7
        
        - name: Copy Example Env to main env
          run: cp .env.example .env

        - name: Docker Setup [Login]
          uses: docker/login-action@v4
          with:
            username: ${{ vars.DOCKERHUB_USERNAME}}
            password: ${{ secrets.DOCKERHUB_TOKEN}}

        - name: Deploy the containers with Docker compose
          run: |
            docker compose pull
            docker compose up -d

