#Goal - i have Lint, Build, Test the code for Frontend & Backend
#Then Push the images to Docker hub

name: CI

on:
  push:
    branches: [advanced]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup NodeJs
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm Packages
        run: npm --prefix frontend/package.json install
        
      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm run test

